name: Release npm

on:
  push:
    tags:
      - 'v*'
      - '!electron-v*'    # 排除 electron tag，避免重复触发

permissions:
  contents: write          # 创建 GitHub Release 需要

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Verify tag matches version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          ROOT_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$ROOT_VERSION" ]; then
            echo "ERROR: tag v$TAG_VERSION != package.json $ROOT_VERSION"
            exit 1
          fi
          echo "Version verified: $ROOT_VERSION"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version
        run: node scripts/sync-version.cjs

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Resolve npm dist-tag
        id: dist_tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "dist-tag: $(cat "$GITHUB_OUTPUT")"

      - name: Sync README for npm page
        run: node scripts/sync-readme.cjs

      # pnpm pack resolves workspace:^ like pnpm publish, while `npm publish
      # <tarball>` also uploads the README into the registry metadata —
      # pnpm publish does not, which left the npm package page blank.
      - name: Pack and publish (topological order)
        run: |
          mkdir -p /tmp/tgz
          for pkg in @doc77/core @doc77/mcp @doc77/ai @doc77/cli idoc77; do
            pnpm --filter "$pkg" pack --pack-destination /tmp/tgz
          done
          for tgz in /tmp/tgz/doc77-core-*.tgz /tmp/tgz/doc77-mcp-*.tgz /tmp/tgz/doc77-ai-*.tgz /tmp/tgz/doc77-cli-*.tgz /tmp/tgz/idoc77-*.tgz; do
            npm publish "$tgz" --access public --tag ${{ steps.dist_tag.outputs.tag }}
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.dist_tag.outputs.tag != 'latest' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
