name: Release npm

on:
  push:
    tags:
      - 'v*'
      - '!electron-v*'    # 排除 electron tag，避免重复触发

permissions:
  contents: write          # 创建 GitHub Release 需要

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Verify tag matches version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          ROOT_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$ROOT_VERSION" ]; then
            echo "ERROR: tag v$TAG_VERSION != package.json $ROOT_VERSION"
            exit 1
          fi
          echo "Version verified: $ROOT_VERSION"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version
        run: node scripts/sync-version.cjs

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Resolve npm dist-tag
        id: dist_tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "dist-tag: $(cat "$GITHUB_OUTPUT")"

      - name: Publish @doc77/core
        run: pnpm --filter @doc77/core publish --access public --no-git-checks --tag ${{ steps.dist_tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @doc77/mcp
        run: pnpm --filter @doc77/mcp publish --access public --no-git-checks --tag ${{ steps.dist_tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @doc77/ai
        run: pnpm --filter @doc77/ai publish --access public --no-git-checks --tag ${{ steps.dist_tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @doc77/cli
        run: pnpm --filter @doc77/cli publish --no-git-checks --tag ${{ steps.dist_tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish idoc77
        run: pnpm --filter idoc77 publish --no-git-checks --tag ${{ steps.dist_tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.dist_tag.outputs.tag != 'latest' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
