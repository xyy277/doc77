packages:
  - "packages/ai"
  - "packages/cli"
  - "packages/core"
  - "packages/doc77"
  - "packages/electron"
  - "packages/gallery"
  - "packages/mcp"
linkWorkspacePackages: true
allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  electron: true
  esbuild: true
  onnxruntime-node: true
  protobufjs: true
  sharp: true
minimumReleaseAgeExclude:
  - '@doc77/ai@0.1.1 || 0.1.4'
  - '@doc77/core@0.1.0 || 0.2.2'
  - '@doc77/mcp@0.1.0 || 0.1.1 || 0.1.5'
  - '@doc77/cli@0.4.4'
