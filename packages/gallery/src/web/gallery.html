<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc77 Gallery</title>
    <!-- Tailwind CSS Setup -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons for elegant, modern iconography -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    },
                    colors: {
                        doc77: {
                            50: '#f5f7fa',
                            100: '#eef2f6',
                            200: '#e1e7ef',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                            primary: '#3b82f6', // Bright blue for primary actions
                            accent: '#60a5fa'
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 15px rgba(59, 130, 246, 0.5)',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            background-color: #0f172a; /* doc77-900 */
            color: #f8fafc;
        }

        /* Custom Scrollbar for dark theme */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5); /* doc77-800 with opacity */
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; /* doc77-700 */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; /* doc77-600 */
        }

        /* Hide scrollbar but allow scrolling for specific areas */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* Masonry Grid Setup */
        .masonry-grid {
            columns: 2;
            column-gap: 1rem;
        }
        @media (min-width: 640px) { .masonry-grid { columns: 3; } }
        @media (min-width: 1024px) { .masonry-grid { columns: 4; } }
        @media (min-width: 1280px) { .masonry-grid { columns: 5; } }
        @media (min-width: 1536px) { .masonry-grid { columns: 6; } }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1rem;
        }

        /* Smooth transitions for interactions */
        .image-card-hover {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
        }
        .image-card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        /* Image overlay gradient */
        .img-overlay {
            background: linear-gradient(to top, rgba(15, 23, 42, 0.8) 0%, rgba(15, 23, 42, 0) 50%);
        }

        /* Select mode styling */
        .select-mode-active .gallery-item-checkbox {
            display: flex;
        }
        .gallery-item.selected .img-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(59, 130, 246, 0.2);
            border: 2px solid #3b82f6;
            border-radius: 0.5rem;
            pointer-events: none;
        }

    </style>
</head>
<body class="h-screen w-full overflow-hidden flex flex-col font-sans text-sm">

    <!-- Top Header / App Bar -->
    <header class="h-14 shrink-0 bg-doc77-900 border-b border-doc77-800 flex items-center justify-between px-4 z-20">
        <!-- Left: Branding & Context -->
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 text-doc77-300 hover:text-white transition-colors cursor-pointer" onclick="goBackToDashboard()">
                <i class="ph ph-arrow-left text-lg"></i>
                <div class="flex items-center gap-2 px-2 py-1 bg-doc77-800 rounded-md">
                    <span class="font-bold text-white text-base tracking-tight flex items-center gap-1">
                        <span class="bg-blue-600 text-white rounded px-1.5 py-0.5 text-xs font-black">77</span>
                        Doc77
                    </span>
                </div>
            </div>

            <!-- Breadcrumbs / Project Name -->
            <div class="hidden sm:flex items-center text-doc77-400">
                <i class="ph ph-caret-right text-xs mx-1"></i>
                <div class="flex items-center gap-1.5 px-2 py-1 rounded hover:bg-doc77-800 cursor-pointer transition-colors text-doc77-200" onclick="resetToPhotos()">
                    <i class="ph-fill ph-folder text-yellow-500"></i>
                    <span class="font-medium breadcrumb-project-name">My Photos</span>
                </div>
                <i class="ph ph-caret-right text-xs mx-1"></i>
                <span class="text-doc77-300 font-medium breadcrumb-current-view">Gallery</span>
            </div>
        </div>

        <!-- Center: Search (Desktop) -->
        <div class="hidden md:flex flex-1 max-w-md mx-8 relative group">
            <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-doc77-500 group-focus-within:text-doc77-300"></i>
            <input type="text" placeholder="Search photos, dates, tags..."
                   class="w-full bg-doc77-950 border border-doc77-700 text-doc77-100 placeholder-doc77-500 rounded-full py-1.5 pl-9 pr-4 focus:outline-none focus:border-doc77-500 focus:bg-doc77-800 transition-all text-sm shadow-inner" id="search-input">
            <div class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-1 hidden group-focus-within:flex text-doc77-500 text-xs">
                <kbd class="font-sans border border-doc77-600 rounded px-1">esc</kbd>
            </div>
        </div>

        <!-- Right: Actions & Tools -->
        <div class="flex items-center gap-1 sm:gap-2">
            <!-- View Toggles -->
            <div class="flex bg-doc77-950 rounded-lg p-0.5 border border-doc77-800">
                <button class="p-1.5 rounded-md bg-doc77-700 text-white shadow-sm" title="Grid View" id="btn-grid-view">
                    <i class="ph ph-squares-four text-lg"></i>
                </button>
                <button class="p-1.5 rounded-md text-doc77-400 hover:text-doc77-200 hover:bg-doc77-800 transition-colors" title="List View" id="btn-list-view">
                    <i class="ph ph-list-dashes text-lg"></i>
                </button>
            </div>

            <div class="w-px h-6 bg-doc77-800 mx-1"></div>

            <button class="p-2 text-doc77-400 hover:text-white rounded-full hover:bg-doc77-800 transition-colors relative" title="Sort & Filter" id="btn-sort-filter">
                <i class="ph ph-faders text-lg"></i>
                <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-blue-500 rounded-full border border-doc77-900"></span>
            </button>
            <button class="p-2 text-doc77-400 hover:text-white rounded-full hover:bg-doc77-800 transition-colors" title="Upload Media" onclick="triggerUpload()">
                <i class="ph ph-upload-simple text-lg"></i>
            </button>

            <button class="ml-2 flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-lg font-medium transition-colors shadow-glow text-sm" onclick="toggleSelectMode()" id="btn-select">
                <i class="ph ph-check-circle"></i>
                <span class="hidden sm:inline">Select</span>
            </button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden relative">

        <!-- Sidebar Navigation -->
        <aside class="w-60 bg-doc77-900/50 border-r border-doc77-800 flex flex-col shrink-0 transition-all duration-300 hidden md:flex" id="sidebar">
            <div class="flex-1 overflow-y-auto py-4 px-3 no-scrollbar space-y-6">

                <!-- Main Nav -->
                <nav class="space-y-1">
                    <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-blue-500/10 text-blue-400 font-medium" data-view="photos">
                        <i class="ph-fill ph-image text-xl"></i>
                        Photos
                        <span class="ml-auto text-xs bg-blue-500/20 px-2 py-0.5 rounded-full">All</span>
                    </a>
                    <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-doc77-300 hover:bg-doc77-800 hover:text-doc77-100 transition-colors group" data-view="timeline">
                        <i class="ph ph-clock-counter-clockwise text-xl group-hover:text-doc77-200"></i>
                        Timeline
                    </a>
                    <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-doc77-300 hover:bg-doc77-800 hover:text-doc77-100 transition-colors group" data-view="videos">
                        <i class="ph ph-video-camera text-xl group-hover:text-doc77-200"></i>
                        Videos
                    </a>
                    <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-doc77-300 hover:bg-doc77-800 hover:text-doc77-100 transition-colors group" data-view="favorites">
                        <i class="ph ph-star text-xl group-hover:text-yellow-400"></i>
                        Favorites
                    </a>
                </nav>

                <!-- Folders -->
                <div>
                    <div class="flex items-center justify-between px-3 mb-2 group cursor-pointer">
                        <h3 class="text-xs font-semibold text-doc77-500 uppercase tracking-wider group-hover:text-doc77-400 transition-colors">Folders</h3>
                        <i class="ph ph-caret-down text-doc77-500"></i>
                    </div>
                    <ul class="space-y-0.5 text-sm ml-2 border-l border-doc77-800 pl-2" id="folder-list">
                        <!-- Dynamically populated by loadFolders() -->
                    </ul>
                </div>

                <!-- Albums -->
                <div>
                    <div class="flex items-center justify-between px-3 mb-2 group cursor-pointer">
                        <h3 class="text-xs font-semibold text-doc77-500 uppercase tracking-wider group-hover:text-doc77-400 transition-colors">Albums</h3>
                        <button class="text-doc77-500 hover:text-white transition-colors" title="New Album" onclick="createAlbum()"><i class="ph ph-plus"></i></button>
                    </div>
                    <ul class="space-y-1" id="album-list">
                        <!-- Dynamically populated by GalleryAlbum.renderAlbumSidebar() -->
                    </ul>
                </div>
            </div>

            <!-- Storage Info -->
            <div class="p-4 border-t border-doc77-800 bg-doc77-900/80">
                <div class="flex items-center justify-between text-xs mb-1">
                    <span class="text-doc77-300 font-medium">Storage</span>
                    <span class="text-doc77-400" id="storage-info">--</span>
                </div>
                <div class="h-1.5 w-full bg-doc77-800 rounded-full overflow-hidden">
                    <div class="h-full bg-blue-500 rounded-full" id="storage-bar" style="width: 0%"></div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-[#0b1121] relative overflow-hidden">

            <!-- Selection Toolbar (Hidden by default) -->
            <div id="selection-toolbar" class="absolute top-0 left-0 right-0 bg-blue-600 text-white px-4 py-3 flex items-center justify-between z-10 transform -translate-y-full transition-transform duration-300 shadow-lg">
                <div class="flex items-center gap-4">
                    <button class="text-white hover:bg-blue-700 p-1 rounded transition-colors" onclick="toggleSelectMode()">
                        <i class="ph ph-x text-xl"></i>
                    </button>
                    <span class="font-semibold text-lg"><span id="selected-count">0</span> Selected</span>
                    <button class="text-blue-200 hover:text-white text-sm" onclick="selectAll()">Select All</button>
                </div>
                <div class="flex items-center gap-2">
                    <button class="p-2 hover:bg-blue-700 rounded-md transition-colors" title="Add to Album" onclick="addSelectedToAlbum()"><i class="ph ph-plus-circle text-xl"></i></button>
                    <button class="p-2 hover:bg-blue-700 rounded-md transition-colors" title="Download"><i class="ph ph-download-simple text-xl"></i></button>
                    <button class="p-2 hover:bg-blue-700 rounded-md transition-colors" title="Share"><i class="ph ph-share-network text-xl"></i></button>
                    <div class="w-px h-5 bg-blue-400/50 mx-1"></div>
                    <button class="p-2 text-red-200 hover:bg-red-500 hover:text-white rounded-md transition-colors" title="Delete"><i class="ph ph-trash text-xl"></i></button>
                </div>
            </div>

            <!-- Scrollable Grid Area (populated by GalleryCore.renderGrid) -->
            <div class="flex-1 overflow-y-auto p-4 md:p-6" id="gallery-container">
                <div class="flex items-center justify-center h-full text-doc77-500">
                    <i class="ph ph-spinner-gap animate-spin text-2xl text-blue-500 mr-2"></i>
                    <span>Loading gallery...</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Lightbox is dynamically created by GalleryLightbox.render() -->

    <script src="js/gallery-core.js"></script>
    <script src="js/gallery-album.js"></script>
    <script src="js/gallery-lightbox.js"></script>

    <script>
        // --- State Management ---
        let state = {
            projectId: null,
            currentPath: '',
            items: [],
            offset: 0,
            limit: 100,
            total: 0,
            selectMode: false,
            selectedIds: new Set(),
            currentView: 'photos',
            sortBy: 'date',
            sortOrder: 'desc',
            searchQuery: ''
        };

        // --- Initialization ---
        async function init() {
            state.projectId = parseInt(new URLSearchParams(window.location.search).get('project'), 10);
            if (!state.projectId) {
                try {
                    const resp = await fetch('/api/projects');
                    const projects = await resp.json();
                    if (projects.length === 1) {
                        state.projectId = projects[0].id;
                    } else {
                        renderProjectPicker(projects);
                        return;
                    }
                } catch (e) {
                    document.getElementById('gallery-container').innerHTML =
                        '<div class="flex items-center justify-center h-full text-doc77-500">Backend not available</div>';
                    return;
                }
            }
            updateBreadcrumb();
            wireSidebarNav();
            loadFolders();
            loadAlbums();
            loadGallery();
        }

        async function updateBreadcrumb() {
            try {
                const resp = await fetch('/api/projects');
                const projects = await resp.json();
                var project = null;
                for (var i = 0; i < projects.length; i++) {
                    if (projects[i].id === state.projectId) {
                        project = projects[i];
                        break;
                    }
                }
                if (project) {
                    var nameEl = document.querySelector('.breadcrumb-project-name');
                    if (nameEl) nameEl.textContent = project.name;
                }
            } catch (_) {}
        }

        function renderProjectPicker(projects) {
            var container = document.getElementById('gallery-container');
            var html = '<div class="flex items-center justify-center h-full"><div class="text-center space-y-4"><h2 class="text-xl font-bold text-doc77-100">Select a Project</h2><div class="space-y-2">';
            for (var i = 0; i < projects.length; i++) {
                html += '<button class="block w-full text-left px-4 py-2 bg-doc77-800 hover:bg-doc77-700 rounded text-doc77-200 transition-colors" onclick="selectProject(' + projects[i].id + ')"><i class="ph-fill ph-folder text-yellow-500 mr-2"></i>' + escHtml(projects[i].name) + '</button>';
            }
            html += '</div></div></div>';
            container.innerHTML = html;
        }

        function selectProject(id) {
            state.projectId = id;
            updateBreadcrumb();
            loadGallery();
            loadFolders();
            loadAlbums();
        }

        function resetToPhotos() {
            state.currentPath = '';
            state.currentView = 'photos';
            state.sortBy = 'date';
            state.sortOrder = 'desc';
            state.searchQuery = '';
            var searchInput = document.getElementById('search-input');
            if (searchInput) searchInput.value = '';
            setActiveNav(document.querySelector('#sidebar nav a[data-view="photos"]'));
            updateBreadcrumbPath();
            loadGallery();
        }

        // --- Gallery Loading ---

        async function loadGallery(path, resetOffset) {
            if (resetOffset === undefined) resetOffset = true;
            if (path !== undefined) state.currentPath = path;
            if (resetOffset) state.offset = 0;

            var params = new URLSearchParams();
            params.set('path', state.currentPath);
            params.set('offset', state.offset);
            params.set('limit', state.limit);
            params.set('sort', state.sortBy);
            params.set('order', state.sortOrder);

            // Filter by media type for videos view
            var types = 'image,video';
            if (state.currentView === 'videos') types = 'video';
            params.set('types', types);

            if (state.searchQuery) params.set('q', state.searchQuery);

            try {
                var resp = await fetch('/api/gallery/' + state.projectId + '?' + params.toString());
                var data = await resp.json();
                state.items = resetOffset ? (data.entries || []) : (state.items || []).concat(data.entries || []);
                state.total = data.total || 0;

                var container = document.getElementById('gallery-container');
                window.GalleryCore.renderGrid(container, state.items, {
                    grouped: state.currentView === 'photos' || state.currentView === 'videos',
                    projectId: state.projectId,
                    onCardClick: function(item) {
                        if (state.selectMode) {
                            toggleSelection(item.path || item.id, null);
                        } else {
                            window.GalleryLightbox.open(item, state.items, state.projectId);
                        }
                    }
                });
                window.GalleryCore.setupLazyLoading();
                updateBreadcrumbPath();
            } catch (e) {
                var container = document.getElementById('gallery-container');
                container.innerHTML = '<div class="flex items-center justify-center h-full text-doc77-500">Failed to load gallery</div>';
            }
        }

        async function loadTimeline() {
            try {
                var resp = await fetch('/api/gallery/timeline/' + state.projectId + '?path=' + encodeURIComponent(state.currentPath));
                var data = await resp.json();
                state.items = data.entries || data.groups || [];
                var container = document.getElementById('gallery-container');
                window.GalleryCore.renderGrid(container, state.items, {
                    grouped: false,
                    projectId: state.projectId,
                    onCardClick: function(item) {
                        if (state.selectMode) {
                            toggleSelection(item.path || item.id, null);
                        } else {
                            window.GalleryLightbox.open(item, state.items, state.projectId);
                        }
                    }
                });
                updateBreadcrumbPath();
            } catch (e) {
                // silently fall back
            }
        }

        // --- Sidebar Navigation ---

        function wireSidebarNav() {
            var links = document.querySelectorAll('#sidebar nav a');
            for (var i = 0; i < links.length; i++) {
                (function(link) {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        var view = link.getAttribute('data-view');
                        if (!view) return;
                        setActiveNav(link);
                        state.currentView = view;
                        state.currentPath = '';
                        if (view === 'timeline') {
                            loadTimeline();
                        } else {
                            loadGallery();
                        }
                    });
                })(links[i]);
            }
        }

        function setActiveNav(el) {
            var links = document.querySelectorAll('#sidebar nav a');
            for (var i = 0; i < links.length; i++) {
                links[i].classList.remove('bg-blue-500/10', 'text-blue-400', 'font-medium');
                links[i].classList.add('text-doc77-300');
            }
            el.classList.add('bg-blue-500/10', 'text-blue-400', 'font-medium');
            el.classList.remove('text-doc77-300');
        }

        // --- Folder Tree ---

        async function loadFolders() {
            try {
                var resp = await fetch('/api/tree/' + state.projectId);
                var data = await resp.json();
                var folderList = document.getElementById('folder-list');
                if (!folderList || !data.entries) return;
                folderList.innerHTML = renderFolderItems(data.entries, '');
                // Wire folder clicks
                var folderLinks = folderList.querySelectorAll('a[data-path]');
                for (var i = 0; i < folderLinks.length; i++) {
                    (function(a) {
                        a.addEventListener('click', function(e) {
                            e.preventDefault();
                            state.currentView = 'folder';
                            loadGallery(a.getAttribute('data-path'));
                        });
                    })(folderLinks[i]);
                }
            } catch (e) {
                // silently ignore — folders may not be available
            }
        }

        function renderFolderItems(entries, prefix) {
            var html = '';
            for (var i = 0; i < entries.length; i++) {
                var entry = entries[i];
                if (entry.type === 'directory') {
                    var path = prefix ? prefix + '/' + entry.name : entry.name;
                    html += '<li><a href="#" class="flex items-center gap-2 px-2 py-1.5 rounded-md text-doc77-300 hover:bg-doc77-800 transition-colors" data-path="' + escAttr(path) + '"><i class="ph-fill ph-folder text-yellow-500/80"></i><span class="truncate">' + escHtml(entry.name) + '</span></a></li>';
                }
            }
            return html || '<li class="px-2 py-1.5 text-doc77-500 text-xs">No folders</li>';
        }

        // --- Albums ---

        async function loadAlbums() {
            try {
                var albumList = document.getElementById('album-list');
                if (albumList) {
                    await window.GalleryAlbum.renderAlbumSidebar(albumList, state.projectId);
                }
            } catch (e) {
                // silently ignore
            }
        }

        async function createAlbum() {
            var name = prompt('New album name:');
            if (!name || !name.trim()) return;
            try {
                await window.GalleryAlbum.createAlbum(name.trim(), '');
                loadAlbums();
            } catch (e) {
                alert('Failed to create album');
            }
        }

        // --- Search ---

        var searchTimeout;
        function setupSearch() {
            var input = document.getElementById('search-input');
            if (!input) return;
            input.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(function() {
                    state.searchQuery = input.value.trim();
                    if (state.currentView === 'timeline') {
                        loadTimeline();
                    } else {
                        loadGallery();
                    }
                }, 400);
            });
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    input.value = '';
                    state.searchQuery = '';
                    if (state.currentView === 'timeline') {
                        loadTimeline();
                    } else {
                        loadGallery();
                    }
                }
            });
        }

        // --- Sort / Filter ---

        function setupSortFilter() {
            var btn = document.getElementById('btn-sort-filter');
            if (!btn) return;

            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                var existing = document.getElementById('sort-dropdown');
                if (existing) {
                    existing.remove();
                    return;
                }

                var dropdown = document.createElement('div');
                dropdown.id = 'sort-dropdown';
                dropdown.className = 'absolute top-full right-0 mt-1 w-48 bg-doc77-900 border border-doc77-700 rounded-lg shadow-2xl z-50 py-1';

                var sorts = [
                    { label: 'Date (newest)', sortBy: 'date', sortOrder: 'desc' },
                    { label: 'Date (oldest)', sortBy: 'date', sortOrder: 'asc' },
                    { label: 'Name (A-Z)', sortBy: 'name', sortOrder: 'asc' },
                    { label: 'Name (Z-A)', sortBy: 'name', sortOrder: 'desc' },
                    { label: 'Size (largest)', sortBy: 'size', sortOrder: 'desc' },
                    { label: 'Size (smallest)', sortBy: 'size', sortOrder: 'asc' },
                ];

                for (var i = 0; i < sorts.length; i++) {
                    (function(opt) {
                        var item = document.createElement('button');
                        item.className = 'block w-full text-left px-3 py-1.5 text-sm text-doc77-300 hover:bg-doc77-800 hover:text-white transition-colors';
                        item.textContent = opt.label;
                        if (state.sortBy === opt.sortBy && state.sortOrder === opt.sortOrder) {
                            item.classList.add('text-blue-400', 'font-medium');
                        }
                        item.addEventListener('click', function() {
                            state.sortBy = opt.sortBy;
                            state.sortOrder = opt.sortOrder;
                            if (state.currentView === 'timeline') {
                                loadTimeline();
                            } else {
                                loadGallery();
                            }
                            var dd = document.getElementById('sort-dropdown');
                            if (dd) dd.remove();
                        });
                        dropdown.appendChild(item);
                    })(sorts[i]);
                }

                btn.parentElement.style.position = 'relative';
                btn.parentElement.appendChild(dropdown);

                var closeHandler = function() {
                    var dd = document.getElementById('sort-dropdown');
                    if (dd) dd.remove();
                    document.removeEventListener('click', closeHandler);
                };
                setTimeout(function() {
                    document.addEventListener('click', closeHandler);
                }, 0);
            });
        }

        // --- Selection Mode ---

        function toggleSelectMode() {
            state.selectMode = !state.selectMode;
            var container = document.getElementById('gallery-container');
            var toolbar = document.getElementById('selection-toolbar');
            var btnSelect = document.getElementById('btn-select');

            if (state.selectMode) {
                container.classList.add('select-mode-active');
                toolbar.classList.remove('-translate-y-full');
                btnSelect.className = 'ml-2 flex items-center gap-2 bg-doc77-700 text-white px-3 py-1.5 rounded-lg font-medium transition-colors text-sm';
                btnSelect.innerHTML = '<i class="ph ph-x"></i><span class="hidden sm:inline">Cancel</span>';
            } else {
                container.classList.remove('select-mode-active');
                toolbar.classList.add('-translate-y-full');
                btnSelect.className = 'ml-2 flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-lg font-medium transition-colors shadow-glow text-sm';
                btnSelect.innerHTML = '<i class="ph ph-check-circle"></i><span class="hidden sm:inline">Select</span>';
                state.selectedIds.clear();
                updateSelectionUI();
            }
        }

        function toggleSelection(id, element) {
            if (state.selectedIds.has(id)) {
                state.selectedIds.delete(id);
            } else {
                state.selectedIds.add(id);
            }
            updateSelectionUI();
        }

        function updateSelectionUI() {
            document.getElementById('selected-count').textContent = state.selectedIds.size;
            var items = document.querySelectorAll('.gallery-item');
            for (var i = 0; i < items.length; i++) {
                var el = items[i];
                var id = el.dataset.id;
                var checkboxIcon = el.querySelector('.gallery-item-checkbox i');
                var checkbox = el.querySelector('.gallery-item-checkbox');

                if (state.selectedIds.has(id)) {
                    el.classList.add('selected');
                    if (checkbox) {
                        checkbox.classList.replace('border-white/70', 'border-blue-500');
                        checkbox.classList.replace('bg-black/20', 'bg-blue-500');
                        checkbox.classList.remove('opacity-0', 'group-hover:opacity-100');
                    }
                    if (checkboxIcon) checkboxIcon.classList.remove('opacity-0', 'scale-50');
                } else {
                    el.classList.remove('selected');
                    if (checkbox) {
                        checkbox.classList.replace('border-blue-500', 'border-white/70');
                        checkbox.classList.replace('bg-blue-500', 'bg-black/20');
                        if (!state.selectMode) {
                            checkbox.classList.add('opacity-0', 'group-hover:opacity-100');
                        }
                    }
                    if (checkboxIcon) checkboxIcon.classList.add('opacity-0', 'scale-50');
                }
            }
        }

        function selectAll() {
            for (var i = 0; i < state.items.length; i++) {
                state.selectedIds.add(state.items[i].path || state.items[i].id);
            }
            updateSelectionUI();
        }

        // --- Add to Album (Selection Mode) ---

        async function addSelectedToAlbum() {
            var paths = Array.from(state.selectedIds);
            if (paths.length === 0) {
                alert('No items selected');
                return;
            }
            var albumId = prompt('Enter Album ID to add ' + paths.length + ' selected items:');
            if (!albumId || !albumId.trim()) return;
            try {
                await window.GalleryAlbum.addToAlbum(parseInt(albumId.trim()), state.projectId, paths);
                state.selectedIds.clear();
                updateSelectionUI();
                toggleSelectMode();
                alert('Added ' + paths.length + ' items to album successfully');
            } catch (e) {
                alert('Failed to add to album: ' + (e.message || 'unknown error'));
            }
        }

        // --- Breadcrumb ---

        function updateBreadcrumbPath() {
            var viewEl = document.querySelector('.breadcrumb-current-view');
            if (!viewEl) return;
            if (state.currentPath) {
                viewEl.textContent = state.currentPath;
            } else {
                var viewLabels = { photos: 'Gallery', timeline: 'Timeline', videos: 'Videos', favorites: 'Favorites', folder: 'Gallery' };
                viewEl.textContent = viewLabels[state.currentView] || 'Gallery';
            }
        }

        // --- Utility Functions ---

        function goBackToDashboard() {
            window.location.href = '/';
        }

        function triggerUpload() {
            var input = document.createElement('input');
            input.type = 'file';
            input.multiple = true;
            input.accept = 'image/*,video/*';
            input.onchange = function() {
                alert('Upload via API: POST /api/upload/' + state.projectId);
            };
            input.click();
        }

        function escHtml(s) {
            return String(s).replace(/[&<>"']/g, function(m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
            });
        }

        function escAttr(s) {
            return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', function() {
            init();
            setupSearch();
            setupSortFilter();
        });
    </script>
</body>
</html>
