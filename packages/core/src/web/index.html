<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doc77 — Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{}}}</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .animate-in { animation:fadeInUp .4s ease-out; }
</style>
</head>
<body class="h-full bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200">

<header class="bg-slate-900 dark:bg-slate-950 text-white">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2.5 text-white font-bold text-lg no-underline">
      <span class="bg-blue-600 text-white px-2 py-1 rounded-md text-sm shadow-sm">📁</span> Doc77
    </a>
    <div class="flex items-center gap-3 text-xs text-emerald-400 font-medium">
      <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span>
      服务运行中
      <button onclick="toggleTheme()" class="text-slate-400 hover:text-white transition-colors text-base" title="切换主题" id="themeBtn">🌙</button>
      <button class="text-slate-400 hover:text-white transition-colors text-base" title="设置" onclick="alert('设置面板（待实现）')">⚙</button>
    </div>
  </div>
</header>

<div class="max-w-5xl mx-auto px-6 py-10">
  <!-- Register -->
  <div class="mb-10">
    <h2 class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-4">注册新项目</h2>
    <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-5 shadow-sm">
      <div class="flex gap-3 items-end flex-wrap">
        <div class="flex flex-col gap-1.5 flex-1 min-w-[160px]">
          <label for="projName" class="text-xs font-semibold text-slate-500 dark:text-slate-400">项目名称</label>
          <input id="projName" placeholder="例如：客户A项目" class="px-3 py-2.5 border border-slate-200 dark:border-slate-600 rounded-lg text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-900 transition-all bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200 placeholder:text-slate-400 dark:placeholder:text-slate-500">
        </div>
        <div class="flex flex-col gap-1.5 flex-[2] min-w-[220px]">
          <label for="projPath" class="text-xs font-semibold text-slate-500 dark:text-slate-400">项目路径（支持 ~ 和 Windows 路径）</label>
          <input id="projPath" placeholder="~/work/my-docs" class="px-3 py-2.5 border border-slate-200 dark:border-slate-600 rounded-lg text-sm font-mono outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-900 transition-all bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200 placeholder:text-slate-400 dark:placeholder:text-slate-500">
        </div>
        <button onclick="doRegister()" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700 transition-colors shadow-sm shrink-0">注册项目</button>
      </div>
      <div id="regError" class="text-red-500 dark:text-red-400 text-xs mt-2 hidden"></div>
    </div>
  </div>

  <!-- Project Grid -->
  <div>
    <h2 class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-4">已注册项目</h2>
    <div id="grid"></div>
  </div>
</div>

<script>
// Theme
(function initTheme() {
  const saved = localStorage.getItem('doc77-theme');
  const prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = saved === 'dark' || (!saved && prefers);
  document.documentElement.classList.toggle('dark', isDark);
  updateThemeIcon(isDark);
})();
function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('doc77-theme', isDark ? 'dark' : 'light');
  updateThemeIcon(isDark);
}
function updateThemeIcon(isDark) {
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = isDark ? '☀️' : '🌙';
}

const API = '/api/projects';
let projects = [];

async function load() {
  try { const r = await fetch(API); projects = await r.json(); renderGrid(); }
  catch(e) { document.getElementById('grid').innerHTML = '<div class="col-span-full text-center py-16 text-slate-400"><p>⚠️ 加载失败</p></div>'; }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  if (!projects.length) {
    grid.className = '';
    grid.innerHTML = '<div class="text-center py-20 text-slate-400 dark:text-slate-500"><div class="text-6xl mb-4 text-slate-300 dark:text-slate-600">📋</div><p class="text-sm">暂无项目，请注册一个本地目录</p><p class="text-xs text-slate-400 dark:text-slate-500 mt-1">支持 ~ 路径和 Windows 路径（WSL 自动转换）</p></div>';
    return;
  }
  grid.className = 'grid gap-4 sm:grid-cols-2';
  grid.innerHTML = projects.map((p,i) => `
    <div onclick="location.href='/preview.html?id=${p.id}'"
      class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-5 cursor-pointer transition-all hover:shadow-lg hover:border-blue-300 dark:hover:border-blue-600 animate-in group">
      <h3 class="text-base font-semibold text-slate-800 dark:text-slate-100 mb-1.5 flex items-center gap-2">📂 ${esc(p.name)}</h3>
      <p class="text-xs text-slate-400 dark:text-slate-500 font-mono truncate mb-4">${esc(p.path)}</p>
      <div class="flex justify-between items-center text-[11px]">
        <span class="text-slate-400 dark:text-slate-500">${new Date(p.created_at).toLocaleDateString('zh-CN')}</span>
        <button onclick="event.stopPropagation();doDelete(${p.id})" class="text-slate-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 px-2 py-1 rounded-md text-xs transition-colors opacity-0 group-hover:opacity-100">删除</button>
      </div>
    </div>
  `).join('');
}

async function doRegister() {
  const name = document.getElementById('projName').value.trim(), pth = document.getElementById('projPath').value.trim(), err = document.getElementById('regError');
  err.classList.add('hidden');
  if (!name || !pth) { err.textContent = '请填写项目名称和路径'; err.classList.remove('hidden'); return; }
  const r = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, path:pth}) });
  if (!r.ok) { const d = await r.json(); err.textContent = d.error || '注册失败'; err.classList.remove('hidden'); return; }
  document.getElementById('projName').value = ''; document.getElementById('projPath').value = '';
  load();
}
async function doDelete(id) { if (!confirm('确定移除此项目？')) return; await fetch(API + '/' + id, { method:'DELETE' }); load(); }
function esc(s) { const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
load();
</script>
</body>
</html>
