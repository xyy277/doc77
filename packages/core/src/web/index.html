<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doc77 — 本地文档预览与管理</title>
<link rel="stylesheet" href="css/app.css">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="app-header-inner">
    <a href="/" class="logo">
      <img src="/assets/logo.svg" alt="Doc77" height="36" class="logo-light">
      <img src="/assets/logo-dark.svg" alt="Doc77" height="36" class="logo-dark">
    </a>
    <div class="header-actions">
      <span class="header-status"><span class="header-dot pulse"></span>运行中</span>
      <button onclick="toggleTheme()" class="btn-icon" id="themeBtn" title="切换主题">🌙</button>
      <button onclick="document.cookie='doc77-desktop=;path=/;max-age=0';location.href='/mobile/'" class="btn-icon" title="移动版">📱</button>
      <button class="btn-icon" title="设置" onclick="toggleSettings()">⚙</button>
    </div>
  </div>
</header>

<div class="content-wrapper">

  <!-- Greeting Bar -->
  <div class="greeting-bar">
    <span class="greeting-text" id="greeting">👋 下午好</span>
    <div class="greeting-actions">
      <button class="btn btn-primary" onclick="showRegisterModal()">+ 注册项目</button>
    </div>
  </div>

  <!-- Stats + Recent Row -->
  <div class="stats-row">
    <div class="stats-panel" id="recentPanel">
      <div class="stats-title">🕐 最近浏览</div>
      <div id="recentContent">
        <div class="empty-state"><div class="empty-text">打开项目后自动出现在这里</div></div>
      </div>
    </div>
    <div class="stats-panel" id="statsPanel" style="position:relative;overflow:hidden">
      <div class="stats-title">📊 统计</div>
      <div class="stats-items" id="statsContent">
        <span class="empty-state" style="padding:8px"><span class="empty-text" style="font-size:12px">加载中...</span></span>
      </div>
      <div class="stats-watermark">📊</div>
    </div>
  </div>

  <!-- Favorites Section -->
  <div class="favorites-section" id="favoritesSection" style="display:none">
    <div class="section-header">
      <span class="section-title">⭐ 收藏项目 (<span id="favCount">0</span>)</span>
    </div>
    <div class="fav-list" id="favList"></div>
  </div>

  <!-- Projects Section -->
  <div class="projects-section">
    <div class="section-header">
      <div class="section-header-left">
        <span class="section-title">📂 全部项目 (<span id="projCount">0</span>)</span>
      </div>
      <div class="section-header-right">
        <input class="input" placeholder="🔍 搜索项目..." oninput="onFilterInput(this.value)" style="width:180px;font-size:12px">
        <select onchange="onSortChange(this.value)" class="input" style="width:100px;font-size:12px">
          <option value="last_opened">最近打开</option>
          <option value="name">按名称</option>
          <option value="created">按创建日期</option>
        </select>
        <div class="view-toggle">
          <button onclick="setViewMode('grid')" id="btnViewGrid" class="active" title="网格视图">▦</button>
          <button onclick="setViewMode('list')" id="btnViewList" title="列表视图">☰</button>
        </div>
      </div>
    </div>
    <div class="project-grid" id="projGrid">
      <div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">暂无项目，点击 [+ 注册项目] 开始</div><div class="empty-hint">或使用 doc77 register 命令注册</div></div>
    </div>
  </div>

</div>

<!-- Registration Modal -->
<div class="modal-overlay" id="registerModal" style="display:none" onclick="if(event.target===this)closeRegisterModal()">
  <div class="modal-box">
    <div class="modal-header">
      <h3>注册项目</h3>
      <button class="btn-icon" onclick="closeRegisterModal()">✕</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" data-tab="manual" onclick="switchRegisterTab('manual')">✏️ 手动输入</button>
      <button class="modal-tab" data-tab="discover" onclick="switchRegisterTab('discover')">🔍 扫描发现</button>
    </div>
    <div class="modal-body">
      <!-- Tab: Manual -->
      <div class="tab-panel active" id="tab-manual">
        <div class="form-group">
          <label>项目名称</label>
          <input class="input" id="regName" placeholder="例如：客户A项目">
        </div>
        <div class="form-group">
          <label>项目路径</label>
          <div class="form-row">
            <input class="input" id="regPath" placeholder="~/work/my-docs">
            <button class="btn" onclick="openDirDialog()">📂 浏览</button>
          </div>
        </div>
        <div class="form-group">
          <div id="regError" style="color:var(--danger);font-size:12px;display:none"></div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
          <button class="btn" onclick="closeRegisterModal()">取消</button>
          <button class="btn btn-primary" onclick="doRegister()">注册项目</button>
        </div>
      </div>
      <!-- Tab: Discover -->
      <div class="tab-panel" id="tab-discover">
        <div class="form-group">
          <label>扫描目录</label>
          <div class="form-row">
            <input class="input" id="discoverPath" value="~" placeholder="~/projects">
            <button class="btn btn-primary" id="btnDiscover" onclick="doDiscover()">🔍 扫描</button>
          </div>
        </div>
        <div id="discoverStatus" class="discover-status"></div>
        <div id="discoverCandidates"></div>
        <div id="discoverActions" style="margin-top:12px;display:none">
          <button class="btn btn-primary" onclick="batchRegister()" style="width:100%">📋 批量注册选中</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Settings Overlay -->
<div id="settingsOverlay" onclick="if(event.target===this)toggleSettings()">
  <div class="settings-backdrop" onclick="toggleSettings()"></div>
  <div class="settings-panel">
    <div style="height:56px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0">
      <span style="font-weight:700;font-size:16px;color:var(--text-primary)">⚙ 设置</span>
      <button onclick="toggleSettings()" class="btn-icon">✕</button>
    </div>
    <div style="display:flex;border-bottom:1px solid var(--border-light);flex-shrink:0" id="settingsTabs">
      <button onclick="switchSettingsTab('system')" class="modal-tab active" data-tab="system" style="border-bottom:none">💾 系统</button>
      <button onclick="switchSettingsTab('ai')" class="modal-tab" data-tab="ai" style="border-bottom:none">🤖 AI</button>
      <button onclick="switchSettingsTab('account')" class="modal-tab" data-tab="account" style="border-bottom:none">👤 账户</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:16px" id="settingsContent"></div>
    <div style="padding:12px;border-top:1px solid var(--border-light);flex-shrink:0;display:flex;gap:8px">
      <button onclick="resetDefaults()" class="btn" style="color:var(--danger);flex:1">恢复默认值</button>
      <button onclick="saveSettings()" class="btn btn-primary" style="flex:1">💾 保存设置</button>
    </div>
  </div>
</div>

<!-- GitHub Star -->
<a href="https://github.com/xyy277/doc77" target="_blank" rel="noopener"
   style="position:fixed;bottom:24px;right:24px;z-index:40;display:flex;align-items:center;gap:8px;background:#1e293b;color:#f1f5f9;padding:10px 18px;border-radius:24px;box-shadow:0 4px 16px rgba(0,0,0,0.2);text-decoration:none;font-size:13px;font-weight:500;transition:all .2s"
   onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'"
   title="给 Doc77 点个 Star ⭐">
  ⭐ 点个 Star 吧
</a>

<script src="js/common.js"></script>
<script src="js/stats.js"></script>
<script src="js/favorites.js"></script>
<script src="js/discover.js"></script>
<script src="js/register.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
